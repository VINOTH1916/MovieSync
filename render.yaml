services:
  # ── Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: moviesync-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false          # set to your Render frontend URL after deploying

  # ── Frontend ─────────────────────────────────────────────────────────────
  - type: web
    name: moviesync-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false          # set to your Render backend URL after deploying
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
